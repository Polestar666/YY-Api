<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 - YYK AI Gateway</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .login-container {
      background: var(--bg-card);
      border-radius: 24px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
      padding: 48px;
      width: 100%;
      max-width: 420px;
      border: 1px solid var(--border-color);
    }

    .login-header {
      text-align: center;
      margin-bottom: 40px;
    }

    .login-header h1 {
      color: var(--text-primary);
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .login-header p {
      color: var(--text-secondary);
      font-size: 14px;
    }

    .form-group {
      margin-bottom: 24px;
    }

    .remember-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: -8px;
      margin-bottom: 24px;
      color: var(--text-secondary);
      font-size: 14px;
    }

    .remember-row input[type="checkbox"] {
      width: 16px;
      height: 16px;
      accent-color: var(--accent-green);
      cursor: pointer;
      flex: 0 0 auto;
    }

    .remember-row label {
      margin: 0;
      cursor: pointer;
      user-select: none;
    }

    .form-group label {
      display: block;
      color: var(--text-primary);
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .form-group input {
      width: 100%;
      height: 48px;
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 0 16px;
      font-size: 15px;
      background: var(--bg-secondary);
      color: var(--text-primary);
      transition: all 0.2s ease;
    }

    .form-group input:focus {
      outline: none;
      border-color: var(--accent-blue);
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
    }

    .form-group input::placeholder {
      color: var(--text-muted);
    }

    .login-btn {
      width: 100%;
      height: 48px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, #22c55e, #16a34a);
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .login-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(34, 197, 94, 0.3);
    }

    .login-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .error-msg {
      color: #ef4444;
      font-size: 14px;
      text-align: center;
      margin-top: 16px;
      display: none;
    }

    .error-msg.show {
      display: block;
    }

    :root {
      --bg-primary: #0f172a;
      --bg-secondary: #1e293b;
      --bg-card: #334155;
      --bg-hover: #475569;
      --text-primary: #f8fafc;
      --text-secondary: #94a3b8;
      --text-muted: #64748b;
      --accent-blue: #3b82f6;
      --accent-green: #22c55e;
      --border-color: #475569;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-header">
      <h1>🚀 YYK AI Gateway</h1>
      <p>请登录以访问管理界面</p>
    </div>
    
    <form id="loginForm">
      <div class="form-group">
        <label for="username">用户名</label>
        <input type="text" id="username" placeholder="请输入用户名" autocomplete="username">
      </div>
      
      <div class="form-group">
        <label for="password">密码</label>
        <input type="password" id="password" placeholder="请输入密码" autocomplete="current-password">
      </div>

      <div class="remember-row">
        <input type="checkbox" id="rememberMe" checked>
        <label for="rememberMe">记住我（7天内免登录）</label>
      </div>
       
      <button type="submit" class="login-btn" id="loginBtn">登录</button>
    </form>
    
    <div class="error-msg" id="errorMsg"></div>
  </div>

  <script>
    console.log('Login page script loaded');

    const loginForm = document.getElementById('loginForm');
    const rememberMeInput = document.getElementById('rememberMe');

    checkExistingSession();

    loginForm.addEventListener('submit', (event) => {
      event.preventDefault();
      handleLogin();
    });

    function getStoredAuthToken() {
      return localStorage.getItem('authToken') || sessionStorage.getItem('authToken') || '';
    }

    async function checkExistingSession() {
      try {
        const token = getStoredAuthToken();
        const headers = token ? { 'Authorization': `Bearer ${token}` } : {};
        const response = await fetch('/api/session', { headers });
        const result = await response.json();
        if (result.valid) {
          window.location.href = '/api-manager-ui.html';
        }
      } catch (error) {
        console.error('Session check failed:', error);
      }
    }
    
    async function handleLogin() {
      console.log('handleLogin called!');
      
      const loginBtn = document.getElementById('loginBtn');
      const errorMsg = document.getElementById('errorMsg');
      
      const usernameInput = document.getElementById('username');
      const passwordInput = document.getElementById('password');
      
      const username = usernameInput ? usernameInput.value.trim() : '';
      const password = passwordInput ? passwordInput.value.trim() : '';
      const rememberMe = Boolean(rememberMeInput?.checked);
      
      console.log('Username:', username);
      console.log('Password:', password);
      
      if (!username || !password) {
        showError('请输入用户名和密码');
        return;
      }
      
      loginBtn.disabled = true;
      loginBtn.textContent = '登录中...';
      
      try {
        console.log('Sending login request to /api/login');
        const response = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password, rememberMe })
        });
        
        console.log('Response status:', response.status);
        const result = await response.json();
        console.log('Response data:', result);
        
        if (result.success) {
          console.log('Login successful, setting token and redirecting');
          if (rememberMe) {
            localStorage.setItem('authToken', result.token);
            sessionStorage.removeItem('authToken');
          } else {
            sessionStorage.setItem('authToken', result.token);
            localStorage.removeItem('authToken');
          }
          console.log('Token saved:', result.token);
          window.location.href = '/api-manager-ui.html';
        } else {
          console.log('Login failed:', result.error);
          showError(result.error || '登录失败');
        }
      } catch (error) {
        console.error('Login error:', error);
        console.error('Error details:', error.message);
        showError('网络错误，请重试');
      } finally {
        loginBtn.disabled = false;
        loginBtn.textContent = '登录';
      }
    }
    
    function showError(message) {
      const errorMsg = document.getElementById('errorMsg');
      errorMsg.textContent = message;
      errorMsg.classList.add('show');
      setTimeout(() => {
        errorMsg.classList.remove('show');
      }, 3000);
    }
  </script>
</body>
</html>
